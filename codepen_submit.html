<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to CodePen...</title>
</head>
<body onload="document.getElementById('form').submit()">
    <form id="form" action="https://codepen.io/pen/define" method="POST">
        <input type="hidden" name="data" id="data">
    </form>
    <script>
        const data = {
            title: "Colorful Particle Background",
            description: "A premium, performant, and colorful particle connection background built with HTML5 Canvas and Vanilla JavaScript.",
            html: `<canvas id="particleCanvas"></canvas>\n<div class="content">\n</div>`,
            css: `* {\n    margin: 0;\n    padding: 0;\n    box-sizing: border-box;\n}\n\nbody {\n    overflow: hidden;\n    background-color: #0b0e14;\n    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;\n}\n\ncanvas {\n    display: block;\n    position: fixed;\n    top: 0;\n    left: 0;\n    width: 100vw;\n    height: 100vh;\n    z-index: -1;\n}\n\n.content {\n    position: relative;\n    z-index: 10;\n    height: 100vh;\n    display: flex;\n    justify-content: center;\n    align-items: center;\n    pointer-events: none;\n}`,
            js: `const canvas = document.getElementById('particleCanvas');\nconst ctx = canvas.getContext('2d');\n\nlet particlesCount = 120;\nconst connectionDistance = 150;\nconst mouseRadius = 200;\nconst particleBaseSize = 2;\nconst repelForce = 0.05;\n\nconst colors = [\n    '#ff5722',\n    '#4caf50',\n    '#2196f3',\n    '#9c27b0',\n    '#e91e63',\n    '#ffeb3b',\n    '#00bcd4'\n];\n\nlet particles = [];\nlet mouse = {\n    x: null,\n    y: null\n};\n\nfunction initCanvas() {\n    canvas.width = window.innerWidth;\n    canvas.height = window.innerHeight;\n}\n\nclass Particle {\n    constructor() {\n        this.init();\n    }\n\n    init() {\n        this.x = Math.random() * canvas.width;\n        this.y = Math.random() * canvas.height;\n        this.vx = (Math.random() - 0.5) * 1.5;\n        this.vy = (Math.random() - 0.5) * 1.5;\n        this.radius = Math.random() * 2 + particleBaseSize;\n        this.color = colors[Math.floor(Math.random() * colors.length)];\n        this.originalColor = this.color;\n    }\n\n    update() {\n        this.x += this.vx;\n        this.y += this.vy;\n\n        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;\n        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;\n\n        if (mouse.x !== null && mouse.y !== null) {\n            const dx = this.x - mouse.x;\n            const dy = this.y - mouse.y;\n            const distance = Math.sqrt(dx * dx + dy * dy);\n\n            if (distance < mouseRadius) {\n                const force = (mouseRadius - distance) / mouseRadius;\n                const angle = Math.atan2(dy, dx);\n                \n                this.x += Math.cos(angle) * force * 5;\n                this.y += Math.sin(angle) * force * 5;\n            }\n        }\n    }\n\n    draw() {\n        ctx.beginPath();\n        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);\n        \n        ctx.shadowBlur = 10;\n        ctx.shadowColor = this.color;\n        \n        ctx.fillStyle = this.color;\n        ctx.fill();\n        \n        ctx.shadowBlur = 0;\n    }\n}\n\nfunction createParticles() {\n    particles = [];\n    for (let i = 0; i < particlesCount; i++) {\n        particles.push(new Particle());\n    }\n}\n\nfunction connect() {\n    for (let i = 0; i < particles.length; i++) {\n        if (mouse.x !== null && mouse.y !== null) {\n            const dx = particles[i].x - mouse.x;\n            const dy = particles[i].y - mouse.y;\n            const dist = Math.sqrt(dx * dx + dy * dy);\n            \n            if (dist < mouseRadius) {\n                ctx.strokeStyle = particles[i].color;\n                ctx.lineWidth = 1;\n                ctx.globalAlpha = 1 - (dist / mouseRadius);\n                ctx.beginPath();\n                ctx.moveTo(particles[i].x, particles[i].y);\n                ctx.lineTo(mouse.x, mouse.y);\n                ctx.stroke();\n            }\n        }\n\n        for (let j = i + 1; j < particles.length; j++) {\n            const dx = particles[i].x - particles[j].x;\n            const dy = particles[i].y - particles[j].y;\n            const dist = Math.sqrt(dx * dx + dy * dy);\n\n            if (dist < connectionDistance) {\n                ctx.strokeStyle = particles[i].color;\n                ctx.lineWidth = 0.8;\n                ctx.globalAlpha = 1 - (dist / connectionDistance);\n                \n                ctx.shadowBlur = 3;\n                ctx.shadowColor = particles[i].color;\n                \n                ctx.beginPath();\n                ctx.moveTo(particles[i].x, particles[i].y);\n                ctx.lineTo(particles[j].x, particles[j].y);\n                ctx.stroke();\n            }\n        }\n    }\n    ctx.globalAlpha = 1;\n}\n\nfunction animate() {\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n    \n    for (const particle of particles) {\n        particle.update();\n        particle.draw();\n    }\n    \n    connect();\n    requestAnimationFrame(animate);\n}\n\nwindow.addEventListener('resize', () => {\n    initCanvas();\n    createParticles();\n});\n\nwindow.addEventListener('mousemove', (e) => {\n    mouse.x = e.x;\n    mouse.y = e.y;\n});\n\nwindow.addEventListener('mouseout', () => {\n    mouse.x = null;\n    mouse.y = null;\n});\n\ninitCanvas();\ncreateParticles();\nanimate();`
        };
        document.getElementById('data').value = JSON.stringify(data);
    </script>
</body>
</html>
